<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clear Cache</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 100px auto; padding: 20px; text-align: center; }
        button { background: #f44336; color: white; padding: 15px 30px; border: none; border-radius: 4px; cursor: pointer; font-size: 18px; margin: 10px; }
        button:hover { background: #d32f2f; }
        .success { color: #4caf50; font-size: 20px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🧹 Clear All Cache</h1>
    <p>Click the button below to clear all cached data and reload the application.</p>
    
    <button onclick="clearEverything()">Clear All Cache & Reload</button>
    
    <div id="status"></div>

    <script>
        async function clearEverything() {
            const status = document.getElementById('status');
            status.innerHTML = '<p>Clearing cache...</p>';

            try {
                // Clear localStorage
                localStorage.clear();
                console.log('✅ localStorage cleared');

                // Clear sessionStorage
                sessionStorage.clear();
                console.log('✅ sessionStorage cleared');

                // Clear service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                    console.log('✅ Service workers cleared');
                }

                // Clear cache storage
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                    console.log('✅ Cache storage cleared');
                }

                status.innerHTML = '<p class="success">✅ All cache cleared!</p><p>Redirecting to main page...</p>';
                
                // Redirect to main page with cache-busting parameter
                setTimeout(() => {
                    window.location.href = '/index.html?v=' + Date.now();
                }, 2000);

            } catch (error) {
                console.error('Error clearing cache:', error);
                status.innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
