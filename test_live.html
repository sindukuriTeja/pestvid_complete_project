<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PestVid AI Assistant - Live Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            color: white;
            margin-bottom: 20px;
        }
        
        .status.online {
            background: rgba(76, 175, 80, 0.3);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }
        
        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .result p {
            color: #555;
            line-height: 1.6;
        }
        
        .tips-list {
            list-style: none;
        }
        
        .tips-list li {
            padding: 10px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid #4caf50;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 10px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffebee;
            border-left-color: #f44336;
        }
        
        .success {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌱 PestVid AI Assistant</h1>
            <p>Your Smart Agricultural Advisor</p>
        </div>
        
        <div class="status online" id="status">
            ✅ Server Status: <span id="statusText">Checking...</span>
        </div>
        
        <div class="grid">
            <!-- Quick Tips Card -->
            <div class="card">
                <h2>💡 Quick Farming Tips</h2>
                <p style="color: #666; margin-bottom: 15px;">Get instant farming tips and best practices</p>
                <button onclick="getQuickTips()">Get Tips</button>
                <div class="loading" id="loading1">
                    <div class="spinner"></div>
                    <p>Loading tips...</p>
                </div>
                <div class="result" id="result1"></div>
            </div>
            
            <!-- AI Advice Card -->
            <div class="card">
                <h2>🤖 AI Agricultural Advice</h2>
                <div class="input-group">
                    <label>Ask anything about farming:</label>
                    <textarea id="adviceQuery" placeholder="e.g., How to prevent tomato blight?"></textarea>
                </div>
                <button onclick="getAIAdvice()">Get Advice</button>
                <div class="loading" id="loading2">
                    <div class="spinner"></div>
                    <p>Consulting AI...</p>
                </div>
                <div class="result" id="result2"></div>
            </div>
            
            <!-- Crop Analysis Card -->
            <div class="card">
                <h2>🔍 Crop Problem Analysis</h2>
                <div class="input-group">
                    <label>Describe the issue:</label>
                    <textarea id="cropDescription" placeholder="e.g., Yellow leaves with brown spots"></textarea>
                </div>
                <button onclick="analyzeCrop()">Analyze</button>
                <div class="loading" id="loading3">
                    <div class="spinner"></div>
                    <p>Analyzing...</p>
                </div>
                <div class="result" id="result3"></div>
            </div>
            
            <!-- Seasonal Advice Card -->
            <div class="card">
                <h2>📅 Seasonal Guidance</h2>
                <div class="input-group">
                    <label>Select Season:</label>
                    <select id="season">
                        <option value="spring">Spring</option>
                        <option value="summer">Summer</option>
                        <option value="fall">Fall</option>
                        <option value="winter">Winter</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Crop (optional):</label>
                    <input type="text" id="crop" placeholder="e.g., tomato">
                </div>
                <button onclick="getSeasonalAdvice()">Get Guidance</button>
                <div class="loading" id="loading4">
                    <div class="spinner"></div>
                    <p>Loading advice...</p>
                </div>
                <div class="result" id="result4"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000';
        
        // Check server status
        async function checkStatus() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                document.getElementById('statusText').textContent = 'Online ✓';
            } catch (error) {
                document.getElementById('statusText').textContent = 'Offline ✗';
                document.getElementById('status').classList.remove('online');
            }
        }
        
        // Get Quick Tips
        async function getQuickTips() {
            const loading = document.getElementById('loading1');
            const result = document.getElementById('result1');
            
            loading.classList.add('show');
            result.classList.remove('show');
            
            try {
                const response = await fetch(`${API_URL}/quick-tips`);
                const data = await response.json();
                
                let html = '<h3>🌟 Farming Tips</h3><ul class="tips-list">';
                data.tips.forEach(tip => {
                    html += `<li>${tip}</li>`;
                });
                html += '</ul>';
                
                result.innerHTML = html;
                result.classList.add('show', 'success');
            } catch (error) {
                result.innerHTML = `<h3>Error</h3><p>${error.message}</p>`;
                result.classList.add('show', 'error');
            } finally {
                loading.classList.remove('show');
            }
        }
        
        // Get AI Advice
        async function getAIAdvice() {
            const query = document.getElementById('adviceQuery').value;
            const loading = document.getElementById('loading2');
            const result = document.getElementById('result2');
            
            if (!query) {
                alert('Please enter a question');
                return;
            }
            
            loading.classList.add('show');
            result.classList.remove('show');
            
            try {
                const response = await fetch(`${API_URL}/simple-ai-advice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await response.json();
                
                result.innerHTML = `
                    <h3>💡 AI Advice</h3>
                    <p><strong>Your Question:</strong> ${data.query}</p>
                    <p><strong>Answer:</strong> ${data.advice}</p>
                    <p style="font-size: 12px; color: #999; margin-top: 10px;">Source: ${data.source}</p>
                `;
                result.classList.add('show', 'success');
            } catch (error) {
                result.innerHTML = `<h3>Error</h3><p>${error.message}</p>`;
                result.classList.add('show', 'error');
            } finally {
                loading.classList.remove('show');
            }
        }
        
        // Analyze Crop
        async function analyzeCrop() {
            const description = document.getElementById('cropDescription').value;
            const loading = document.getElementById('loading3');
            const result = document.getElementById('result3');
            
            if (!description) {
                alert('Please describe the crop issue');
                return;
            }
            
            loading.classList.add('show');
            result.classList.remove('show');
            
            try {
                const response = await fetch(`${API_URL}/analyze-description`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description })
                });
                const data = await response.json();
                
                let html = `
                    <h3>🔬 Analysis Results</h3>
                    <p><strong>Diagnosis:</strong> ${data.diagnosis}</p>
                    <h4 style="margin-top: 15px; color: #667eea;">Recommendations:</h4>
                    <ul style="margin-left: 20px;">
                `;
                data.recommendations.forEach(rec => {
                    html += `<li style="margin-bottom: 5px;">${rec}</li>`;
                });
                html += `</ul><p style="margin-top: 10px; font-style: italic; color: #666;">${data.next_steps}</p>`;
                
                result.innerHTML = html;
                result.classList.add('show', 'success');
            } catch (error) {
                result.innerHTML = `<h3>Error</h3><p>${error.message}</p>`;
                result.classList.add('show', 'error');
            } finally {
                loading.classList.remove('show');
            }
        }
        
        // Get Seasonal Advice
        async function getSeasonalAdvice() {
            const season = document.getElementById('season').value;
            const crop = document.getElementById('crop').value;
            const loading = document.getElementById('loading4');
            const result = document.getElementById('result4');
            
            loading.classList.add('show');
            result.classList.remove('show');
            
            try {
                const response = await fetch(`${API_URL}/seasonal-advice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ season, crop })
                });
                const data = await response.json();
                
                let html = `
                    <h3>📅 ${data.season.charAt(0).toUpperCase() + data.season.slice(1)} Guidance</h3>
                    <p>${data.advice}</p>
                    <h4 style="margin-top: 15px; color: #667eea;">Key Tasks:</h4>
                    <ul style="margin-left: 20px;">
                `;
                data.key_tasks.forEach(task => {
                    html += `<li style="margin-bottom: 5px;">${task}</li>`;
                });
                html += '</ul>';
                
                result.innerHTML = html;
                result.classList.add('show', 'success');
            } catch (error) {
                result.innerHTML = `<h3>Error</h3><p>${error.message}</p>`;
                result.classList.add('show', 'error');
            } finally {
                loading.classList.remove('show');
            }
        }
        
        // Check status on load
        checkStatus();
        setInterval(checkStatus, 30000); // Check every 30 seconds
    </script>
</body>
</html>
